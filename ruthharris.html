<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Ruth Harris Letters — IslandLetters.com</title>
  <meta name="description" content="Ruth Harris Letters — IslandLetters.com" />
  <style>
    :root{
      --ink: #0b1220;
      --paper: rgba(255,255,255,.86);
      --paper-strong: rgba(255,255,255,.92);
      --shadow: rgba(0,0,0,.25);

      --link: #0b3d91;
      --link-hover: #7d1023;
    }

    *{ box-sizing:border-box; }

    body{
      margin:0;
      min-height:100svh;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
      color: var(--ink);

      /* Wallpaper background */
      background-image: url("images/background.jpeg");
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
    }

    /* Adds a subtle overlay so text stays readable on busy photos */
    .overlay{
      min-height:100svh;
      background:
        linear-gradient(180deg, rgba(0,0,0,.35) 0%, rgba(0,0,0,.15) 35%, rgba(0,0,0,.35) 100%);
      display:flex;
      justify-content:center;
    }

    .shell{
      width:min(980px, calc(100% - 2rem));
      padding: 2rem 1rem 3rem;
    }

    header{
      text-align:center;
      padding: 1.5rem 1rem 1.25rem;
      border-radius: 18px;
      background: rgba(12, 33, 74, .35);
      border: 1px solid rgba(255,255,255,.22);
      box-shadow: 0 18px 60px var(--shadow);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
    }

    .site-title{
      margin: 0;
      font-weight: 800;
      letter-spacing: .02em;
      line-height: 1.05;
      color: rgba(255,255,255,.96);
      text-shadow: 0 2px 18px rgba(0,0,0,.45);
      font-size: clamp(2.0rem, 4.8vw, 3.3rem);
    }

    .subhead{
      margin: .55rem 0 1.1rem;
      font-weight: 650;
      letter-spacing: .01em;
      color: rgba(255,255,255,.92);
      text-shadow: 0 2px 14px rgba(0,0,0,.4);
      font-size: clamp(1.15rem, 2.2vw, 1.6rem);
    }

    .portrait{
      display:block;
      width: min(35%, 320px);
      max-width: 100%;
      height: auto;
      margin: 0 auto;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,.35);
      box-shadow: 0 14px 40px rgba(0,0,0,.35);
      background: var(--paper-strong);
    }

    main{
      margin-top: 1.25rem;
    }

    .card{
      background: var(--paper);
      border: 1px solid rgba(255,255,255,.55);
      border-radius: 18px;
      padding: 1.25rem 1.25rem 1.1rem;
      box-shadow: 0 18px 60px var(--shadow);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
    }

    h2{
      margin:0 0 .75rem 0;
      font-size: 1.25rem;
    }

    /* Letters list */
    .letters{
      list-style: none;
      padding: 0;
      margin: 0;
      display: grid;
      gap: .7rem;
    }

    .letter{
      display:flex;
      gap: .75rem;
      justify-content: space-between;
      align-items: baseline;
      padding: .75rem .85rem;
      border-radius: 14px;
      border: 1px solid rgba(0,0,0,.08);
      background: rgba(255,255,255,.55);
    }

    .letter a{
      color: var(--link);
      font-weight: 750;
      text-decoration: none;
    }
    .letter a:hover{
      text-decoration: underline;
      color: var(--link-hover);
    }

    .date{
      white-space: nowrap;
      font-weight: 650;
      opacity: .85;
    }

    @media (max-width: 720px){
      .portrait{ width: min(70%, 340px); }
      .letter{ flex-direction: column; align-items: flex-start; }
      .date{ margin-top: .1rem; }
    }
  </style>
</head>

<body>
  <div class="overlay">
    <div class="shell">
      <header>
        <h1 class="site-title">IslandLetters.com</h1>
        <div class="subhead">Ruth Harris Letters</div>
        <img class="portrait"
             src="images/ruthharris.jpeg"
             alt="Ruth Harris" />
      </header>

      <main>
        <section class="card">
          <h2>Letters</h2>

          <ul class="letters">
            <li class="letter">
              <a href="ruthharris2111945.html">Letter To Mother</a>
              <span class="date">November 2, 1945</span>
            </li>
          </ul>
        </section>
      </main>
    </div>
  </div>
</body>
</html>
